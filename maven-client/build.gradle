plugins {
    id 'base'
}

repositories {
    mavenLocal()
    maven { url 'https://jitpack.io' }
    mavenCentral()
}

configurations {
    flashableZip
}

dependencies {
    flashableZip('com.github.micro5k:google-sync-addon:latest.release:full@zip')
}

tasks.register('downloadZip', Copy) {
    group = 'download'
    from configurations.flashableZip
    into layout.buildDirectory
}
